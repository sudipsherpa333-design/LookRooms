<!DOCTYPE html>
<html>
<head>
    <style>
        .container { font-family: sans-serif; max-width: 600px; margin: 0 auto; padding: 20px; border: 1px solid #eee; }
        .logo { text-align: center; margin-bottom: 20px; }
        .success-icon { text-align: center; font-size: 48px; color: #10b981; margin: 20px 0; }
        .details { background-color: #f1f5f9; padding: 15px; border-radius: 8px; font-size: 13px; margin: 20px 0; }
        .footer { font-size: 12px; color: #94a3b8; text-align: center; margin-top: 40px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <h2>LookRooms</h2>
        </div>
        <hr>
        <div class="success-icon">✅</div>
        <p>Hi {{userName}},</p>
        <p>Your password has been successfully changed.</p>
        
        <div class="details">
            <strong>🕒 Change Details</strong><br>
            Time: {{time}}<br>
            If this wasn't you, please secure your account immediately.
        </div>

        <p>You can now log in with your new password.</p>

        <div class="footer">
            &copy; {{currentYear}} LookRooms Nepal. All rights reserved.
        </div>
    </div>
</body>
</html>
